<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>학생 로그인 — 올림포스</title>
<meta name="theme-color" content="#1A1611">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #F7F3EC;
  --paper-2: #EDE8DF;
  --ink: #1A1611;
  --ink-60: #5C5448;
  --ink-30: #A09888;
  --ink-12: #DDD8CF;
  --accent: #2C6E63;
  --accent-bg: #E0EDEA;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(44,110,99,0.06), transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(90,60,20,0.04), transparent);
}
.card { width: 100%; max-width: 380px; animation: fadeUp .4s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  font-family: var(--mono); font-size: 11px; color: var(--ink-30);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 36px; padding: 0; transition: color .15s;
}
.back-btn:hover { color: var(--ink-60); }
.page-title {
  font-family: var(--serif); font-size: 30px; font-weight: 400;
  line-height: 1.2; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 10px;
}
.page-title em { font-style: italic; color: var(--ink-60); }
.page-desc { font-size: 13px; color: var(--ink-60); line-height: 1.6; margin-bottom: 36px; }
.already-in {
  display: none; margin-bottom: 16px; padding: 14px 16px;
  background: var(--accent-bg); border: 1px solid rgba(44,110,99,0.2); border-radius: 2px;
}
.already-in .ai-label {
  font-family: var(--mono); font-size: 9px; color: var(--accent);
  letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px;
}
.already-in .ai-name { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
.already-in .ai-email { font-family: var(--mono); font-size: 11px; color: var(--ink-60); }
.google-btn {
  width: 100%; display: flex; align-items: center; justify-content: center;
  gap: 12px; padding: 16px 20px; background: var(--ink); color: var(--paper);
  border: none; border-radius: 2px; font-family: var(--sans); font-size: 14px;
  font-weight: 500; cursor: pointer; letter-spacing: -0.01em;
  position: relative; overflow: hidden; transition: opacity .15s;
}
.google-btn:hover { opacity: 0.85; }
.google-btn:active { transform: scale(0.99); }
.google-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.google-btn svg { flex-shrink: 0; }
.switch-btn {
  width: 100%; display: flex; align-items: center; justify-content: center;
  gap: 10px; padding: 13px 20px; background: transparent; color: var(--ink-60);
  border: 1px solid var(--ink-12); border-radius: 2px; font-family: var(--sans);
  font-size: 13px; cursor: pointer; margin-top: 10px; transition: all .15s;
}
.switch-btn:hover { background: var(--paper-2); border-color: var(--ink-30); color: var(--ink); }
.error-box {
  display: none; margin-top: 14px; padding: 12px 14px;
  background: #FEF3EF; border: 1px solid #E8C4B4; border-radius: 2px;
  font-size: 12px; color: #7A3928; font-family: var(--mono); line-height: 1.5;
}
.loading-wrap {
  display: none; flex-direction: column; align-items: center; gap: 12px; padding: 24px 0;
}
.spinner {
  width: 28px; height: 28px; border: 2px solid var(--ink-12);
  border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-wrap p { font-family: var(--mono); font-size: 11px; color: var(--ink-30); letter-spacing: 0.08em; }
.accent-bar { width: 3px; height: 100%; background: var(--accent); position: fixed; left: 0; top: 0; opacity: 0.6; }
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="card">
  <button class="back-btn" onclick="location.href='login.html'">
    ← 뒤로
  </button>

  <div class="page-title">학생 로그인</div>
  <div class="page-desc">학교 구글 계정으로 로그인하세요.</div>

  <div class="already-in" id="already-in">
    <div class="ai-label">현재 로그인된 계정</div>
    <div class="ai-name" id="ai-name">—</div>
    <div class="ai-email" id="ai-email">—</div>
  </div>

  <div id="btn-wrap">
    <button class="google-btn" id="google-btn" disabled>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#fff" opacity=".9"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#fff" opacity=".8"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#fff" opacity=".7"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#fff" opacity=".6"/>
      </svg>
      Google 계정으로 로그인
    </button>
    <div class="error-box" id="error-box"></div>
    <button class="switch-btn" id="switch-btn" style="display:none" onclick="signOutAndSwitch()">
      다른 계정으로 로그인
    </button>
  </div>

  <div class="loading-wrap" id="loading-wrap">
    <div class="spinner"></div>
    <p>로그인 중...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyA7eXZngqwmumIDqPfKSacj1zMrZFbS6NE",
    authDomain:        "commonenglish1-87a08.firebaseapp.com",
    projectId:         "commonenglish1-87a08",
    storageBucket:     "commonenglish1-87a08.firebasestorage.app",
    messagingSenderId: "148417856875",
    appId:             "1:148417856875:web:73c4f991d94d3af980f82e",
    measurementId:     "G-RKFJ51EMKT"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const db       = getFirestore(app);
  const provider = new GoogleAuthProvider();

  if (sessionStorage.getItem('force_account_select')) {
    sessionStorage.removeItem('force_account_select');
    provider.setCustomParameters({ prompt: 'select_account' });
  }

  document.getElementById('loading-wrap').style.display = 'none';
  document.getElementById('btn-wrap').style.opacity = '1';

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      setTimeout(async () => {
        await syncUser(user);
        window.location.href = '올림포스_1to20강.html';
      }, 800);
      document.getElementById('already-in').style.display = 'block';
      document.getElementById('ai-name').textContent  = user.displayName || '이름 없음';
      document.getElementById('ai-email').textContent = user.email || '';
      document.getElementById('google-btn').textContent = '이 계정으로 계속하기';
      document.getElementById('switch-btn').style.display = 'flex';
    }
  });

  document.getElementById('google-btn').disabled = false;
  document.getElementById('google-btn').addEventListener('click', async () => {
    const btn      = document.getElementById('google-btn');
    const loading  = document.getElementById('loading-wrap');
    const btnWrap  = document.getElementById('btn-wrap');
    const errorBox = document.getElementById('error-box');

    if (auth.currentUser) {
      btn.disabled = true; btnWrap.style.opacity = '0.4'; loading.style.display = 'flex';
      await syncUser(auth.currentUser);
      window.location.href = '올림포스_1to20강.html';
      return;
    }

    btn.disabled = true; errorBox.style.display = 'none';
    btnWrap.style.opacity = '0.4'; loading.style.display = 'flex';

    try {
      const result = await signInWithPopup(auth, provider);
      await syncUser(result.user);
      window.location.href = '올림포스_1to20강.html';
    } catch (err) {
      loading.style.display = 'none'; btnWrap.style.opacity = '1'; btn.disabled = false;
      errorBox.style.display = 'block';
      errorBox.textContent =
        err.code === 'auth/popup-closed-by-user' ? '로그인 창이 닫혔습니다. 다시 시도해주세요.' :
        err.code === 'auth/network-request-failed' ? '네트워크 오류입니다. 인터넷 연결을 확인해주세요.' :
        `로그인 오류: ${err.message}`;
    }
  });

  window.signOutAndSwitch = async function() {
    const { signOut } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    await signOut(auth);
    document.getElementById('already-in').style.display = 'none';
    document.getElementById('switch-btn').style.display = 'none';
    document.getElementById('google-btn').disabled = false;
    provider.setCustomParameters({ prompt: 'select_account' });
    await signInWithPopup(auth, provider);
  };

  async function syncUser(user) {
    const ref  = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        uid: user.uid, email: user.email,
        name: user.displayName || '', photoURL: user.photoURL || '',
        createdAt: serverTimestamp(), lastLogin: serverTimestamp(), role: 'student',
      });
    } else {
      await setDoc(ref, { lastLogin: serverTimestamp() }, { merge: true });
    }
  }
</script>
</body>
</html>
