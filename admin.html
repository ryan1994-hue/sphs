<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올림포스 관리자 대시보드</title>
<meta name="theme-color" content="#1A1611">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper:    #F7F3EC;
  --paper-2:  #EDE8DF;
  --paper-3:  #E3DBCF;
  --ink:      #1A1611;
  --ink-60:   #5C5448;
  --ink-30:   #A09888;
  --ink-12:   #DDD8CF;
  --accent:   #2C6E63;
  --accent-bg:#E0EDEA;
  --warn:     #C0392B;
  --warn-bg:  #FEF3EF;
  --serif:    'DM Serif Display', Georgia, serif;
  --sans:     'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',-apple-system,sans-serif;
  --mono:     'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans); background: var(--paper); color: var(--ink);
  min-height: 100vh; font-size: 14px; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.admin-head {
  background: var(--ink); color: var(--paper);
  padding: 0 24px; height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.admin-head .left { display: flex; align-items: center; gap: 12px; }
.admin-head img { width: 26px; height: 26px; object-fit: contain; filter: invert(1); opacity: 0.7; }
.admin-head .brand { font-family: var(--serif); font-size: 16px; font-weight: 400; }
.admin-head .badge {
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.16em;
  text-transform: uppercase; background: var(--accent);
  padding: 3px 8px; border-radius: 2px; color: var(--paper);
}
.admin-head .right { display: flex; align-items: center; gap: 12px; }
.admin-head .admin-name { font-family: var(--mono); font-size: 10px; opacity: 0.5; letter-spacing: 0.06em; }
.logout-btn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  background: rgba(247,243,236,0.1); border: 1px solid rgba(247,243,236,0.15);
  color: var(--paper); padding: 6px 12px; cursor: pointer; border-radius: 2px;
  transition: background .15s;
}
.logout-btn:hover { background: rgba(247,243,236,0.18); }
.admin-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 24px 60px; }
.sec-title {
  font-family: var(--mono); font-size: 9px; color: var(--ink-30);
  letter-spacing: 0.16em; text-transform: uppercase;
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px; margin-top: 32px;
}
.sec-title::after { content: ''; flex: 1; height: 1px; background: var(--ink-12); }
.sec-title:first-child { margin-top: 0; }
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 8px; }
.stat-card { background: #fff; border: 1px solid var(--ink-12); padding: 18px 20px; border-radius: 2px; }
.stat-card .n {
  font-family: var(--serif); font-size: 36px; font-weight: 400;
  color: var(--ink); line-height: 1; letter-spacing: -0.02em; display: block; margin-bottom: 6px;
}
.stat-card .l { font-family: var(--mono); font-size: 9px; color: var(--ink-30); letter-spacing: 0.1em; text-transform: uppercase; }
.stat-card .sub { font-size: 11px; color: var(--ink-30); margin-top: 4px; }
.table-wrap { background: #fff; border: 1px solid var(--ink-12); border-radius: 2px; overflow-x: auto; margin-bottom: 8px; -webkit-overflow-scrolling: touch; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  font-family: var(--mono); font-size: 9px; font-weight: 400; color: var(--ink-30);
  letter-spacing: 0.12em; text-transform: uppercase; padding: 10px 16px;
  text-align: left; border-bottom: 1px solid var(--ink-12); background: var(--paper-2);
  white-space: nowrap;
}
.data-table td { padding: 11px 16px; border-bottom: 1px solid var(--ink-12); font-size: 13px; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--paper-2); }
.data-table .name { font-weight: 500; color: var(--ink); }
.data-table .email { color: var(--ink-30); font-family: var(--mono); font-size: 11px; }
.data-table .date { color: var(--ink-30); font-family: var(--mono); font-size: 11px; }
.pbar-wrap { display: flex; align-items: center; gap: 8px; min-width: 120px; }
.pbar { flex: 1; height: 4px; background: var(--ink-12); border-radius: 2px; overflow: hidden; }
.pbar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
.pbar-val { font-family: var(--mono); font-size: 10px; color: var(--ink-30); min-width: 28px; text-align: right; }
.student-filter-bar {
  display: flex; gap: 6px; padding: 10px 16px;
  border-bottom: 1px solid var(--ink-12); background: var(--paper-2);
  flex-wrap: wrap; align-items: center;
}
.student-filter-tab {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 5px 14px; border-radius: 2px;
  border: 1px solid var(--ink-12); cursor: pointer;
  color: var(--ink-30); background: transparent; transition: all .15s;
}
.student-filter-tab:hover { color: var(--ink-60); background: var(--paper-3); border-color: var(--ink-30); }
.student-filter-tab.active { color: var(--accent); background: var(--accent-bg); border-color: var(--accent); }
.student-count-badge { font-family: var(--mono); font-size: 9px; color: var(--ink-30); margin-left: auto; letter-spacing: 0.08em; }
.heatmap-wrap { background: #fff; border: 1px solid var(--ink-12); border-radius: 2px; overflow-x: auto; }
.heatmap-table { border-collapse: collapse; width: 100%; font-size: 11px; }
.heatmap-table th {
  font-family: var(--mono); font-size: 8.5px; color: var(--ink-30);
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--ink-12);
  background: var(--paper-2); white-space: nowrap;
}
.heatmap-table th.name-col { text-align: left; padding-left: 16px; min-width: 140px; }
.heatmap-table td {
  padding: 7px 4px; text-align: center; border-bottom: 1px solid var(--ink-12);
  font-family: var(--mono); font-size: 10px; color: var(--ink-30); transition: background .1s;
}
.heatmap-table td.name-cell {
  text-align: left; padding-left: 16px; color: var(--ink); font-family: var(--sans);
  font-size: 12px; font-weight: 500; white-space: nowrap;
}
.heatmap-table tr:last-child td { border-bottom: none; }
.h0 { background: var(--paper-2); color: var(--ink-12); }
.h1 { background: #d1e9e4; color: #2C6E63; }
.h2 { background: #a8d4cc; color: #1d5048; }
.h3 { background: #7dbfb4; color: #124038; }
.h4 { background: #2C6E63; color: #fff; }
.class-tabs {
  display: flex; gap: 6px; padding: 12px 16px 0;
  border-bottom: 1px solid var(--ink-12); background: var(--paper-2); flex-wrap: wrap;
}
.class-tab {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 6px 14px; border-radius: 2px 2px 0 0;
  border: 1px solid transparent; border-bottom: none;
  cursor: pointer; color: var(--ink-30); background: transparent;
  transition: all .15s; margin-bottom: -1px;
}
.class-tab:hover { color: var(--ink-60); background: var(--paper-3); }
.class-tab.active { color: var(--accent); background: #fff; border-color: var(--ink-12); border-bottom-color: #fff; }
.weak-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.weak-item {
  background: #fff; border: 1px solid var(--ink-12); padding: 12px 16px;
  border-radius: 2px; display: flex; align-items: center; justify-content: space-between;
}
.weak-item .word { font-weight: 500; color: var(--ink); font-size: 15px; }
.weak-item .meaning { font-size: 12px; color: var(--ink-30); margin-top: 2px; }
.weak-item .wrong-ct {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  color: var(--warn); background: var(--warn-bg); padding: 3px 8px; border-radius: 2px; white-space: nowrap;
}
.loading-screen {
  min-height: calc(100vh - 54px);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
.spinner { width: 28px; height: 28px; border: 2px solid var(--ink-12); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-screen p { font-family: var(--mono); font-size: 11px; color: var(--ink-30); letter-spacing: 0.1em; text-transform: uppercase; }
.empty { padding: 40px; text-align: center; color: var(--ink-30); font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
.refresh-btn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  background: var(--paper-2); border: 1px solid var(--ink-12); color: var(--ink-60);
  padding: 7px 14px; cursor: pointer; border-radius: 2px; transition: all .15s;
}
.refresh-btn:hover { background: var(--paper-3); color: var(--ink); }
@media (max-width: 700px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .weak-grid { grid-template-columns: 1fr; }
  .admin-wrap { padding: 20px 16px 50px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="admin-head">
  <div class="left">
    <!-- 기존 img 태그 그대로 -->
    <span class="brand">올림포스 고1 영어</span>
    <span class="badge">관리자</span>
  </div>
  <div class="right">
    <span class="admin-name" id="admin-name">admin</span>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <p>데이터 불러오는 중...</p>
</div>

<!-- DASHBOARD -->
<div class="admin-wrap" id="dashboard" style="display:none">

  <div class="sec-title">전체 현황</div>
  <div class="stat-grid">
    <div class="stat-card"><span class="n" id="st-total">—</span><div class="l">전체 학생</div></div>
    <div class="stat-card"><span class="n" id="st-today">—</span><div class="l">오늘 접속</div><div class="sub" id="st-today-sub"></div></div>
    <div class="stat-card"><span class="n" id="st-avg-acc">—</span><div class="l">평균 정답률</div></div>
    <div class="stat-card"><span class="n" id="st-avg-prog">—</span><div class="l">평균 학습 진행률</div></div>
  </div>

  <div class="sec-title" style="margin-top:32px">
    학생 목록
    <button class="refresh-btn" onclick="loadDashboard()" style="margin-left:auto;font-size:10px">새로고침</button>
  </div>
  <div class="table-wrap">
    <div class="student-filter-bar" id="student-filter-bar"></div>
    <table class="data-table">
      <thead>
        <tr>
          <th>이름</th><th>닉네임</th><th>반</th><th>번호</th>
          <th>마지막 접속</th><th>학습 단어</th><th>정답률</th><th>학습 진행률</th>
        </tr>
      </thead>
      <tbody id="student-tbody"><tr><td colspan="8" class="empty">로딩 중...</td></tr></tbody>
    </table>
  </div>

  <div class="sec-title">강별 진행률 히트맵</div>
  <div class="heatmap-wrap">
    <div class="class-tabs" id="class-tabs"></div>
    <div style="overflow-x:auto">
      <table class="heatmap-table" id="heatmap-table">
        <thead><tr id="heatmap-head"><th class="name-col">이름</th></tr></thead>
        <tbody id="heatmap-body"></tbody>
      </table>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;margin-top:8px;padding:0 4px">
    <span style="font-family:var(--mono);font-size:9px;color:var(--ink-30);letter-spacing:0.1em">진행률:</span>
    <span class="h0" style="padding:2px 8px;border-radius:2px;font-family:var(--mono);font-size:9px">0%</span>
    <span class="h1" style="padding:2px 8px;border-radius:2px;font-family:var(--mono);font-size:9px">1–25%</span>
    <span class="h2" style="padding:2px 8px;border-radius:2px;font-family:var(--mono);font-size:9px">26–50%</span>
    <span class="h3" style="padding:2px 8px;border-radius:2px;font-family:var(--mono);font-size:9px">51–75%</span>
    <span class="h4" style="padding:2px 8px;border-radius:2px;font-family:var(--mono);font-size:9px">76–100%</span>
  </div>

  <div class="sec-title">전체 약점 단어 TOP 20 (오답률 기준)</div>
  <div class="weak-grid" id="weak-grid">
    <div class="empty" style="grid-column:span 2">로딩 중...</div>
  </div>

  <div class="sec-title" style="margin-top:32px">점수 관리</div>
  <div style="background:#fff;border:1px solid var(--ink-12);border-radius:2px;overflow:hidden;margin-bottom:8px">
    <div style="padding:16px 20px;border-bottom:1px solid var(--ink-12);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <div>
        <div style="font-size:14px;font-weight:500;color:var(--ink);margin-bottom:3px">전체 점수 초기화</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--ink-30);letter-spacing:0.02em">모든 학생의 주간/월간 점수를 0으로 초기화합니다. 되돌릴 수 없습니다.</div>
      </div>
      <button id="reset-all-btn" onclick="resetAllScores()"
        style="padding:9px 20px;background:var(--warn);border:none;font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#fff;cursor:pointer;border-radius:2px;white-space:nowrap;transition:opacity .15s"
        onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">⚠ 전체 초기화</button>
    </div>
    <div style="overflow-x:auto">
      <table class="data-table" id="score-table">
        <thead>
          <tr>
            <th>닉네임</th><th>반 / 번호</th><th>주간 점수</th><th>월간 점수</th><th>개별 초기화</th>
          </tr>
        </thead>
        <tbody id="score-tbody"><tr><td colspan="5" class="empty">로딩 중...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyA7eXZngqwmumIDqPfKSacj1zMrZFbS6NE",
  authDomain:        "commonenglish1-87a08.firebaseapp.com",
  projectId:         "commonenglish1-87a08",
  storageBucket:     "commonenglish1-87a08.firebasestorage.app",
  messagingSenderId: "148417856875",
  appId:             "1:148417856875:web:73c4f991d94d3af980f82e",
  measurementId:     "G-RKFJ51EMKT"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const TOTAL_VOCAB = 3382;
const TOTAL_GANGS = 20;

// ── 로그아웃 ─────────────────────────────────────────────────────
window.doLogout = function() {
  localStorage.removeItem('admin_logged_in');
  window.location.href = 'login.html';
};

// ── Load all data ────────────────────────────────────────────────
window.loadDashboard = async function() {
  document.getElementById('loading-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';

  try {
    const usersSnap = await getDocs(collection(db, 'users'));
    const students  = [];
    usersSnap.forEach(d => {
      const data = d.data();
      if (data.role !== 'admin') students.push({ uid: d.id, ...data });
    });

    const progressData = await Promise.all(students.map(async (s) => {
      try {
        const progSnap = await getDoc(doc(db, 'progress', s.uid));
        const progData = progSnap.exists() ? progSnap.data() : {};
        const prof = progData.profile || {};
        const enrichedStudent = {
          ...s,
          nick: s.nick || prof.nick || '',
          cls:  (s.cls != null && s.cls !== '') ? s.cls : (prof.cls != null ? prof.cls : ''),
          num:  (s.num != null && s.num !== '') ? s.num : (prof.num != null ? prof.num : ''),
        };
        return { student: enrichedStudent, progress: progData };
      } catch { return { student: s, progress: {} }; }
    }));

    renderDashboard(progressData);
    await loadScoreTable();
  } catch (err) {
    console.error(err);
    alert('데이터 로드 오류: ' + err.message);
  } finally {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  }
};

function renderDashboard(data) {
  const today = new Date().toISOString().slice(0, 10);
  let todayCount = 0, totalAccNum = 0, totalAccDen = 0, totalProgNum = 0;

  data.forEach(({ student, progress }) => {
    const lastLogin = student.lastLogin?.toDate?.()?.toISOString?.()?.slice(0,10) || '';
    if (lastLogin === today) todayCount++;
    const qt = progress.quizTotal   || 0;
    const qc = progress.quizCorrect || 0;
    if (qt > 0) { totalAccNum += qc; totalAccDen += qt; }
    const learned = Object.keys(progress.learned || {}).length;
    totalProgNum += (learned / TOTAL_VOCAB) * 100;
  });

  document.getElementById('st-total').textContent    = data.length;
  document.getElementById('st-today').textContent    = todayCount;
  document.getElementById('st-avg-acc').textContent  = totalAccDen > 0 ? Math.round(100 * totalAccNum / totalAccDen) + '%' : '—';
  document.getElementById('st-avg-prog').textContent = data.length > 0 ? Math.round(totalProgNum / data.length) + '%' : '—';

  // ── 학생 목록 ─────────────────────────────────────────────────
  const studentClasses = ['전체', ...new Set(
    data.map(d => d.student.cls).filter(c => c !== undefined && c !== null && c !== '')
        .map(String).sort((a,b) => Number(a)-Number(b))
  )];

  window._stData   = data;
  window._stActive = '전체';
  window._stClasses = studentClasses;

  window._renderStudentTabs = function() {
    const filtered = window._stActive === '전체'
      ? window._stData
      : window._stData.filter(d => String(d.student.cls || '') === window._stActive);
    document.getElementById('student-filter-bar').innerHTML =
      window._stClasses.map(c =>
        `<button class="student-filter-tab${c === window._stActive ? ' active' : ''}" onclick="setStudentClass('${c}')">${c === '전체' ? '전체' : c + '반'}</button>`
      ).join('') + `<span class="student-count-badge">${filtered.length}명</span>`;
  };

  window.setStudentClass = function(cls) {
    window._stActive = cls;
    window._renderStudentTabs();
    window._renderStudentTable();
  };

  window._renderStudentTable = function() {
    const filtered = window._stActive === '전체'
      ? window._stData
      : window._stData.filter(d => String(d.student.cls || '') === window._stActive);

    const tbody = document.getElementById('student-tbody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">학생이 없습니다</td></tr>';
      return;
    }
    const sorted = [...filtered].sort((a, b) => {
      const ca = Number(a.student.cls) || 0, cb = Number(b.student.cls) || 0;
      if (ca !== cb) return ca - cb;
      return (Number(a.student.num) || 0) - (Number(b.student.num) || 0);
    });
    tbody.innerHTML = sorted.map(({ student: s, progress: p }) => {
      const lastLogin = s.lastLogin?.toDate?.()?.toLocaleDateString('ko-KR') || '—';
      const learned = Object.keys(p.learned || {}).length;
      const qt = p.quizTotal || 0, qc = p.quizCorrect || 0;
      const acc  = qt > 0 ? Math.round(100 * qc / qt) : null;
      const prog = Math.min(100, Math.round(learned / TOTAL_VOCAB * 100));
      return `<tr>
        <td class="name">${esc(s.name || '이름없음')}</td>
        <td class="date">${esc(s.nick || '—')}</td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--ink-60)">${esc(String(s.cls||'—'))}</td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--ink-60)">${esc(String(s.num||'—'))}</td>
        <td class="date">${lastLogin}</td>
        <td class="date">${learned.toLocaleString()}</td>
        <td>${acc !== null ? acc + '%' : '—'}</td>
        <td><div class="pbar-wrap"><div class="pbar"><div class="pbar-fill" style="width:${prog}%"></div></div><div class="pbar-val">${prog}%</div></div></td>
      </tr>`;
    }).join('');
  };

  window._renderStudentTabs();
  window._renderStudentTable();

  // ── 히트맵 ───────────────────────────────────────────────────
  const classes = ['전체', ...new Set(
    data.map(d => d.student.cls).filter(Boolean).map(String).sort((a,b) => Number(a)-Number(b))
  )].map(c => c === '전체' ? '전체' : c + '반');

  window._hmData    = data;
  window._hmClasses = classes;
  window._hmActive  = '전체';

  window._renderHmTabs = function() {
    document.getElementById('class-tabs').innerHTML = window._hmClasses.map(c =>
      `<button class="class-tab${c === window._hmActive ? ' active' : ''}" onclick="setHeatmapClass('${c}')">${c}</button>`
    ).join('');
  };

  window.setHeatmapClass = function(cls) {
    window._hmActive = cls;
    window._renderHmTabs();
    window._renderHm();
  };

  window._renderHm = function() {
    const filtered = window._hmActive === '전체'
      ? window._hmData
      : window._hmData.filter(d => String(d.student.cls || '') + '반' === window._hmActive);

    const sorted = [...filtered].sort((a, b) => {
      const ca = Number(a.student.cls) || 0, cb = Number(b.student.cls) || 0;
      if (ca !== cb) return ca - cb;
      return (Number(a.student.num) || 0) - (Number(b.student.num) || 0);
    });

    document.getElementById('heatmap-head').innerHTML =
      '<th class="name-col">이름</th>' +
      Array.from({length: TOTAL_GANGS}, (_, i) => `<th>${i+1}강</th>`).join('');

    const hmBody = document.getElementById('heatmap-body');
    if (sorted.length === 0) {
      hmBody.innerHTML = '<tr><td colspan="21" class="empty">학생이 없습니다</td></tr>';
      return;
    }
    hmBody.innerHTML = sorted.map(({ student: s, progress: p }) => {
      const learned = p.learned || {};
      const gangCounts = {};
      Object.keys(learned).forEach(key => {
        const gang = key.split('_')[0];
        gangCounts[gang] = (gangCounts[gang] || 0) + 1;
      });
      const cells = Array.from({length: TOTAL_GANGS}, (_, i) => {
        const g = String(i + 1);
        const pct = Math.min(100, Math.round((gangCounts[g] || 0) / 169 * 100));
        const hClass = pct === 0 ? 'h0' : pct <= 25 ? 'h1' : pct <= 50 ? 'h2' : pct <= 75 ? 'h3' : 'h4';
        return `<td class="${hClass}" title="${pct}%">${pct > 0 ? pct + '%' : ''}</td>`;
      }).join('');
      const clsNum = (s.cls ? s.cls + '반 ' : '') + (s.num ? s.num + '번' : '');
      return `<tr>
        <td class="name-cell">${esc(s.name || s.nick || '—')}${clsNum ? `<div style="font-family:var(--mono);font-size:9px;color:var(--ink-30);margin-top:1px">${esc(clsNum)}</div>` : ''}</td>
        ${cells}
      </tr>`;
    }).join('');
  };

  window._renderHmTabs();
  window._renderHm();

  // ── 약점 단어 ────────────────────────────────────────────────
  const wordErrors = {};
  data.forEach(({ progress: p }) => {
    Object.entries(p.learned || {}).forEach(([key, rec]) => {
      if ((rec.wrong || 0) > 0) {
        const word = key.split('_')[1];
        if (!word) return;
        if (!wordErrors[word]) wordErrors[word] = { word, wrong: 0, meaning: rec.meaning || '' };
        wordErrors[word].wrong += rec.wrong;
      }
    });
  });

  const topWeak = Object.values(wordErrors).sort((a, b) => b.wrong - a.wrong).slice(0, 20);
  const weakGrid = document.getElementById('weak-grid');
  weakGrid.innerHTML = topWeak.length === 0
    ? '<div class="empty" style="grid-column:span 2">오답 데이터가 없습니다</div>'
    : topWeak.map(w => `
        <div class="weak-item">
          <div><div class="word">${esc(w.word)}</div><div class="meaning">${esc(w.meaning)}</div></div>
          <div class="wrong-ct">${w.wrong}회 오답</div>
        </div>`).join('');
}

function esc(s) {
  return String(s||'').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── 점수 테이블 ──────────────────────────────────────────────────
async function loadScoreTable() {
  const tbody = document.getElementById('score-tbody');
  tbody.innerHTML = '<tr><td colspan="5" class="empty">불러오는 중...</td></tr>';
  try {
    const snap = await getDocs(collection(db, 'ranking'));
    if (snap.empty) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">랭킹 데이터가 없습니다</td></tr>';
      return;
    }
    const rows = [];
    snap.forEach(d => rows.push({ id: d.id, ...d.data() }));
    rows.sort((a, b) => (b.weeklyScore || 0) - (a.weeklyScore || 0));
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td class="name">${esc(r.nick || '(없음)')}</td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--ink-60)">${esc(String(r.cls||'?'))}반 ${esc(String(r.num||'?'))}번</td>
        <td style="font-family:var(--mono);font-size:13px;color:var(--ink)">${(r.weeklyScore||0).toLocaleString()}점</td>
        <td style="font-family:var(--mono);font-size:13px;color:var(--ink-60)">${(r.monthlyScore||0).toLocaleString()}점</td>
        <td>
          <button onclick="resetUserScore('${r.id}','${esc(r.nick||'')}')"
            style="padding:5px 12px;background:none;border:1px solid var(--ink-12);font-family:var(--mono);font-size:10px;letter-spacing:0.06em;color:var(--ink-60);cursor:pointer;border-radius:2px;transition:all .12s"
            onmouseover="this.style.borderColor='var(--warn)';this.style.color='var(--warn)'"
            onmouseout="this.style.borderColor='var(--ink-12)';this.style.color='var(--ink-60)'">초기화</button>
        </td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty" style="color:var(--warn)">${e.message}</td></tr>`;
  }
}

window.resetUserScore = async function(uid, nick) {
  if (!confirm(`"${nick || uid}" 의 점수를 초기화하시겠습니까?`)) return;
  try {
    await setDoc(doc(db, 'ranking', uid), { weeklyScore: 0, monthlyScore: 0, updatedAt: new Date().toISOString() }, { merge: true });
    alert(`"${nick}" 점수가 초기화되었습니다.`);
    loadScoreTable();
  } catch(e) { alert('초기화 실패: ' + e.message); }
};

window.resetAllScores = async function() {
  if (!confirm('⚠️ 모든 학생의 주간/월간 점수를 초기화합니다.\n이 작업은 되돌릴 수 없습니다. 계속하시겠습니까?')) return;
  if (!confirm('정말로 전체 점수를 0으로 초기화하시겠습니까?')) return;
  const btn = document.getElementById('reset-all-btn');
  btn.disabled = true; btn.textContent = '처리 중...';
  try {
    const snap = await getDocs(collection(db, 'ranking'));
    let cnt = 0;
    for (const d of snap.docs) {
      await setDoc(doc(db, 'ranking', d.id), { weeklyScore: 0, monthlyScore: 0, updatedAt: new Date().toISOString() }, { merge: true });
      cnt++;
    }
    alert(`${cnt}명의 점수가 초기화되었습니다.`);
    loadScoreTable();
  } catch(e) {
    alert('초기화 실패: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '⚠ 전체 초기화';
  }
};

// ── Auth guard ───────────────────────────────────────────────────
if (localStorage.getItem('admin_logged_in') === 'true') {
  document.getElementById('admin-name').textContent = 'admin';
  window.loadDashboard();
} else {
  window.location.href = 'login.html';
}
</script>
